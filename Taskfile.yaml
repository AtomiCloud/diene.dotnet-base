version: '3'
includes:
  docker: tasks/Taskfile.docker.yaml
  secret: tasks/Taskfile.secret.yaml
  test: tasks/Taskfile.test.yaml
tasks:
  setup:
    desc: Setup the repository
    cmds:
      - ./scripts/local/setup.sh
      - ./scripts/local/secrets.sh
  build:
    desc: Build the .NET solution (Release)
    cmds:
      - dotnet build dotnet-base.slnx -c Release
  lint:
    desc: Lints the whole code-base
    cmds:
      - pre-commit run --all-files
  dead-code:
    desc: Inspect for dead code across all projects
    cmds:
      - ./scripts/local/dotnet-dead-code.sh
  dead-code:no-test:
    desc: Inspect for dead code excluding tests (test-only production code counts as dead)
    cmds:
      - ./scripts/local/dotnet-dead-code.sh --no-test
