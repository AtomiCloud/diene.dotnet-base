name: CI
on:
  push: null
jobs:
  precommit:
    name: Pre-Commit
    uses: ./.github/workflows/⚡reusable-precommit.yaml
    secrets: inherit
  unit:
    name: Unit Tests
    uses: ./.github/workflows/⚡reusable-test.yaml
    secrets: inherit
    with:
      mode: unit
      name: Unit
  int:
    name: Integration Tests
    uses: ./.github/workflows/⚡reusable-test.yaml
    secrets: inherit
    with:
      mode: int
      name: Integration
  build:
    name: Build
    uses: ./.github/workflows/⚡reusable-build.yaml
    secrets: inherit
  docker:
    name: Docker Image
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/⚡reusable-docker.yaml
    secrets: inherit
    with:
      image_name: diene-dotnet-base
      dockerfile: ./infra/Dockerfile
